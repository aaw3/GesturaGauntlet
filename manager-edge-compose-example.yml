services:
  node-agent:
    build:
      context: .
      dockerfile: node-agent/Dockerfile
    container_name: gestura-edge-node-agent
    environment:
      NODE_ENV: production
      CENTRAL_API_URL: http://host.docker.internal:3001
      CENTRAL_WS_URL: http://host.docker.internal:3001
      NODE_ID: edge-node-1
      NODE_NAME: Edge Node 1
      NODE_TOKEN: example-node-shared-token
      NODE_AGENT_PORT: 3201
      NODE_LAN_URLS: wss://edge-node-host.local:3201/glove,ws://edge-node-host.local:3201/glove
      NODE_PUBLIC_URLS: wss://edge.example.dev/glove
      MANAGER_SHARED_TOKEN: example-manager-shared-token
      PICO_API_TOKEN: example-pico-api-token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3201:3201"
    networks:
      - gestura_edge_net
    restart: unless-stopped

  kasa-manager:
    build:
      context: .
      dockerfile: kasa-manager/Dockerfile
    container_name: gestura-edge-kasa-manager
    environment:
      NODE_ENV: production
      NODE_AGENT_WS_URL: http://node-agent:3201
      MANAGER_ID: kasa-main
      MANAGER_KIND: kasa
      MANAGER_NAME: Kasa Main
      MANAGER_TOKEN: example-manager-shared-token
      MANAGER_ICON_KEY: lightbulb
      MANAGER_COLOR_KEY: amber
      MANAGER_LAN_URL: http://edge-node-host.local:3301
      KASA_DISCOVERY_TIMEOUT_MS: 3000
      KASA_SCAN_INTERVAL_MS: 300000
    depends_on:
      - node-agent
    networks:
      - gestura_edge_net
    restart: unless-stopped

networks:
  gestura_edge_net:
    driver: bridge
