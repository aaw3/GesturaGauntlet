services:
  postgres:
    image: postgres:16
    container_name: gestura-postgres
    environment:
      POSTGRES_USER: gestura
      POSTGRES_PASSWORD: gestura_dev_password
      POSTGRES_DB: gestura
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gestura_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestura -d gestura"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    container_name: gestura-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: gestura
      DOCKER_INFLUXDB_INIT_PASSWORD: gestura_influx_password
      DOCKER_INFLUXDB_INIT_ORG: gestura
      DOCKER_INFLUXDB_INIT_BUCKET: gestura_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: gestura-influx-admin-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - gestura_net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    container_name: gestura-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: gestura_grafana_password
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - gestura_net

  gestura-backend:
    build:
      context: .
      dockerfile: gestura-backend/Dockerfile
    container_name: gestura-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://gestura:gestura_dev_password@postgres:5432/gestura
      DATABASE_SSL: "false"
      SESSION_SECRET: example-dashboard-session-secret-change-me
      DASHBOARD_USERNAME: admin
      DASHBOARD_PASSWORD_HASH: scrypt$$REPLACE$$ME
      NODE_SHARED_TOKEN: example-node-shared-token
      PICO_API_TOKEN: example-pico-api-token
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: gestura-influx-admin-token
      INFLUXDB_ORG: gestura
      INFLUXDB_BUCKET: gestura_metrics
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    ports:
      - "3001:3001"
      - "1883:1883"
    networks:
      - gestura_net

  simulator:
    build:
      context: .
      dockerfile: Simulator/Dockerfile
    container_name: gestura-simulator
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3101
    depends_on:
      - gestura-backend
    ports:
      - "3101:3101"
    networks:
      - gestura_net

  sim-manager:
    build:
      context: .
      dockerfile: sim-manager/Dockerfile
    container_name: gestura-sim-manager
    environment:
      NODE_ENV: production
      NODE_AGENT_WS_URL: http://node-agent:3201
      MANAGER_ID: sim-main
      MANAGER_KIND: simulator
      MANAGER_NAME: Simulator Main
      MANAGER_TOKEN: example-manager-shared-token
      MANAGER_ICON_KEY: cpu
      MANAGER_COLOR_KEY: cyan
      SIM_MANAGER_URL: http://0.0.0.0:3102
      SIMULATOR_API_URL: http://simulator:3101
      MANAGER_LAN_URL: http://sim-manager:3102
    depends_on:
      - simulator
      - node-agent
    ports:
      - "3102:3102"
    networks:
      - gestura_net

  dashboard:
    build:
      context: .
      dockerfile: Dashboard/Dockerfile
    container_name: gestura-dashboard
    environment:
      NODE_ENV: production
      PORT: 3100
      HOST: 0.0.0.0
    depends_on:
      - gestura-backend
    ports:
      - "3100:3100"
    networks:
      - gestura_net

  node-agent:
    build:
      context: .
      dockerfile: node-agent/Dockerfile
    container_name: gestura-node-agent
    environment:
      NODE_ENV: production
      CENTRAL_API_URL: http://gestura-backend:3001
      CENTRAL_WS_URL: http://gestura-backend:3001
      NODE_ID: docker-edge-1
      NODE_NAME: Docker Edge 1
      NODE_TOKEN: example-node-shared-token
      NODE_AGENT_PORT: 3201
      NODE_LAN_URL: http://node-agent:3201
      MANAGER_SHARED_TOKEN: example-manager-shared-token
    depends_on:
      - gestura-backend
    ports:
      - "3201:3201"
    networks:
      - gestura_net

volumes:
  postgres_data:
  influxdb_data:
  grafana_data:

networks:
  gestura_net:
    driver: bridge
